<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f7fc;
      }
      .container {
        max-width: 960px;
        margin: 2rem auto;
        background: #fff;
        border-radius: 12px;
        padding: 1.2rem;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      .btn {
        display: inline-block;
        margin-bottom: 1rem;
        background: #0d6efd;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        padding: 0.6rem 0.9rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid #e2e8f0;
        padding: 0.6rem;
        text-align: left;
      }
      form {
        display: inline;
      }
      .btn-danger {
        background: #dc3545;
        border: 0;
        color: #fff;
        border-radius: 6px;
        padding: 0.4rem 0.7rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Gestión de Productos</h1>
      <a class="btn" th:href="@{/productos/nuevo}">Nuevo producto</a>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${productos}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.nombre}"></td>
            <td th:text="${p.descripcion}"></td>
            <td th:text="${p.precio}"></td>
            <td>
              <a th:href="@{/productos/editar/{id}(id=${p.id})}">Editar</a>
              <form
                th:action="@{/productos/eliminar/{id}(id=${p.id})}"
                method="post"
              >
                <button type="submit" class="btn-danger">Eliminar</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
